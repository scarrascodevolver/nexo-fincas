<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiosco — Nexo Fincas</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Montserrat', sans-serif;
  background: #0C1828;
  height: 100vh;
  display: flex;
  align-items: center; justify-content: center;
  -webkit-font-smoothing: antialiased;
  padding: 40px 64px;
}

/* ── Layout horizontal ── */
.kiosco-wrap {
  display: flex;
  align-items: center;
  gap: 64px;
  width: 100%;
  max-width: 960px;
}

/* ── Columna izquierda: branding ── */
.kiosco-brand {
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding-right: 64px;
  border-right: 1px solid rgba(255,255,255,0.08);
}
.kiosco-brand img { height: 72px; width: auto; }
.kiosco-brand-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.26em;
  text-transform: uppercase; color: rgba(255,255,255,0.28);
  text-align: center;
}

/* ── Columna derecha: formulario ── */
.kiosco-form {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.kiosco-title {
  font-size: 28px; font-weight: 700;
  color: #ffffff; letter-spacing: -0.02em;
  line-height: 1.2; margin-bottom: 6px;
}
.kiosco-sub {
  font-size: 14px; font-weight: 300;
  color: rgba(255,255,255,0.38);
  margin-bottom: 28px; line-height: 1.5;
}

.dni-field {
  width: 100%;
  background: rgba(255,255,255,0.07);
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 14px;
  padding: 18px 24px;
  font-size: 36px; font-weight: 700;
  color: #ffffff; letter-spacing: 0.18em;
  text-align: center; font-family: 'Montserrat', sans-serif;
  outline: none; margin-bottom: 20px;
  transition: border-color 0.2s, background 0.2s;
}
.dni-field:focus {
  border-color: #2EA3F2;
  background: rgba(46,163,242,0.08);
}
.dni-field::placeholder { color: rgba(255,255,255,0.18); letter-spacing: 0.1em; font-size: 28px; font-weight: 400; }

.kiosco-btn {
  width: 100%;
  background: #0C71C3;
  border: none; border-radius: 14px;
  padding: 18px;
  font-size: 18px; font-weight: 700;
  font-family: 'Montserrat', sans-serif;
  color: #fff; cursor: pointer;
  letter-spacing: 0.04em;
  transition: background 0.2s, transform 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 12px;
}
.kiosco-btn:hover { background: #0a5fa3; transform: scale(1.01); }
.kiosco-btn svg { width: 22px; height: 22px; flex-shrink: 0; }

.kiosco-hint {
  margin-top: 24px;
  font-size: 13px; font-weight: 500;
  color: rgba(255,255,255,0.18);
  display: flex; align-items: center; gap: 10px;
}
.kiosco-hint::before, .kiosco-hint::after {
  content: ''; flex: 1; height: 1px;
  background: rgba(255,255,255,0.07);
}

.privacy-note {
  margin-top: 18px;
  font-size: 12px; color: rgba(255,255,255,0.16);
  display: flex; align-items: center; gap: 8px;
}
.privacy-note svg { width: 12px; height: 12px; opacity: 0.4; flex-shrink: 0; }
</style>
</head>
<body>

<div class="kiosco-wrap">

  <!-- Branding izquierda -->
  <div class="kiosco-brand">
    <img src="uploads/logo.png" alt="Nexo Fincas">
    <span class="kiosco-brand-label">Portal de<br>propietarios</span>
  </div>

  <!-- Formulario derecha -->
  <div class="kiosco-form">
    <div class="kiosco-title">¿Cuál es tu DNI?</div>
    <div class="kiosco-sub">Introduce tu número y accede a toda la información de tu comunidad</div>

    <input type="text" class="dni-field" placeholder="12345678A" maxlength="9" id="dni-input">

    <button class="kiosco-btn" onclick="acceder()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 8 16 12 12 16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Ver mi información
    </button>

    <div class="kiosco-hint">o solicita ayuda al administrador</div>

    <div class="privacy-note">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Conexión segura · Tus datos están protegidos
    </div>
  </div>

</div>

<script>
document.getElementById('dni-input').focus();
function acceder() {
  const val = document.getElementById('dni-input').value.trim();
  if (!val) { document.getElementById('dni-input').focus(); return; }
  document.getElementById('dni-input').style.borderColor = '#059669';
  document.querySelector('.kiosco-btn').innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Accediendo...';
  document.querySelector('.kiosco-btn').style.background = '#059669';
}
</script>
</body>
</html>
