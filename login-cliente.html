<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Área Cliente — Nexo Fincas</title>
  <link rel="icon" href="assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:       #1691cd;
      --blue-dark:  #0c71c3;
      --blue-deep:  #0a2540;
      --teal:       #29c4a9;
      --teal-dark:  #0e9a80;
      --white:      #ffffff;
      --gray-100:   #f1f5f9;
      --gray-200:   #e2e8f0;
      --gray-300:   #cbd5e1;
      --gray-400:   #94a3b8;
      --gray-500:   #64748b;
      --gray-600:   #475569;
      --gray-700:   #334155;
      --gray-800:   #1e293b;
      --gray-900:   #0f172a;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--gray-700);
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 1rem;
      position: relative;
      overflow: hidden;
      background: var(--blue-deep);
    }

    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(circle at 80% 20%, rgba(41,196,169,.35), transparent 55%),
        radial-gradient(circle at 15% 85%, rgba(22,145,205,.35), transparent 55%),
        linear-gradient(135deg, rgba(22,145,205,.7) 0%, rgba(12,113,195,.78) 55%, rgba(10,37,64,.85) 120%);
      pointer-events: none;
    }

    .back-home {
      position: absolute;
      top: 1.5rem; left: 1.5rem;
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      text-decoration: none;
      color: rgba(255,255,255,.85);
      font-size: .85rem;
      font-weight: 500;
      padding: .55rem .9rem;
      border-radius: 100px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.25);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: all .2s;
      z-index: 10;
    }
    .back-home:hover { color: var(--white); background: rgba(255,255,255,.25); }
    .back-home svg { width: 15px; height: 15px; }

    /* ─── CARD GLASSMORPHISM ─── */
    .login-card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 400px;
      padding: 1.75rem 1.85rem 1.5rem;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 20px;
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      box-shadow:
        0 30px 80px rgba(10, 37, 64, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.25);
      color: var(--white);
    }

    .card-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 1.25rem;
    }
    .card-logo {
      width: 88px;
      height: 88px;
      display: grid;
      place-items: center;
      margin-bottom: .6rem;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,.3));
    }
    .card-logo img { width: 100%; height: 100%; object-fit: contain; }

    .card-tag {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .25rem .7rem;
      background: rgba(41,196,169,.28);
      border: 1px solid rgba(155,229,211,.5);
      border-radius: 100px;
      font-size: .68rem;
      font-weight: 700;
      color: #d7f5ec;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: .55rem;
    }
    .card-tag .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--white);
      box-shadow: 0 0 10px var(--white);
    }
    .card-title {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--white);
      margin-bottom: .25rem;
    }
    .card-subtitle {
      font-size: .85rem;
      color: rgba(255,255,255,.8);
    }

    /* ─── FORMULARIO ─── */
    .form-group { margin-bottom: .85rem; }
    .form-label {
      display: block;
      font-size: .78rem;
      font-weight: 600;
      color: rgba(255,255,255,.9);
      margin-bottom: .4rem;
    }
    .form-input-wrap { position: relative; }

    /* INPUT CLARO Y VISIBLE */
    .form-input {
      width: 100%;
      padding: .75rem 1rem .75rem 2.7rem;
      border: 1.5px solid rgba(255,255,255,.4);
      border-radius: 10px;
      font-family: inherit;
      font-size: .95rem;
      color: var(--gray-900);
      background: rgba(255,255,255,.97);
      transition: border-color .2s, background .2s, box-shadow .2s;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--teal);
      background: var(--white);
      box-shadow: 0 0 0 4px rgba(41,196,169,.35);
    }
    .form-input::placeholder { color: var(--gray-400); }
    .form-input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--gray-500);
      pointer-events: none;
    }
    .form-toggle-pw {
      position: absolute;
      right: .7rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: 0;
      cursor: pointer;
      padding: .35rem;
      color: var(--gray-500);
      border-radius: 6px;
      transition: color .2s;
    }
    .form-toggle-pw:hover { color: var(--teal-dark); }
    .form-toggle-pw svg { width: 18px; height: 18px; display: block; }

    .form-row-between {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.1rem;
      flex-wrap: wrap;
      gap: .5rem;
    }
    .form-check {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      font-size: .84rem;
      color: rgba(255,255,255,.9);
      cursor: pointer;
      user-select: none;
    }
    .form-check input {
      width: 15px; height: 15px;
      accent-color: var(--teal);
      cursor: pointer;
    }
    .form-forgot {
      font-size: .84rem;
      color: #d7f5ec;
      text-decoration: none;
      font-weight: 500;
    }
    .form-forgot:hover { color: var(--white); text-decoration: underline; }

    .btn-submit {
      width: 100%;
      padding: .8rem 1.5rem;
      background: linear-gradient(135deg, var(--teal) 0%, var(--blue) 100%);
      color: var(--white);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 10px;
      font-family: inherit;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(41,196,169,.4);
      transition: transform .15s, box-shadow .2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
    }
    .btn-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 40px rgba(41,196,169,.55);
    }
    .btn-submit svg { width: 18px; height: 18px; }

    .card-footer {
      margin-top: 1.15rem;
      text-align: center;
      font-size: .82rem;
      color: rgba(255,255,255,.8);
    }
    .card-footer a {
      color: #d7f5ec;
      font-weight: 600;
      text-decoration: none;
    }
    .card-footer a:hover { color: var(--white); text-decoration: underline; }

    @media (max-width: 520px) {
      .login-card { padding: 2rem 1.5rem; border-radius: 20px; }
      .card-title { font-size: 1.4rem; }
      .back-home { top: 1rem; left: 1rem; }
    }
  </style>
</head>
<body>
  <video class="bg-video" autoplay muted loop playsinline preload="auto">
    <source src="https://nexofincas.com/wp-content/uploads/2024/12/Videofinal.mp4" type="video/mp4" />
  </video>
  <div class="bg-overlay"></div>

  <a href="index.html" class="back-home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Volver al inicio
  </a>

  <div class="login-card">
    <div class="card-header">
      <div class="card-logo">
        <img src="assets/logo.png" alt="Nexo Fincas" />
      </div>
      <span class="card-tag">
        <span class="dot"></span>
        Área Cliente
      </span>
      <h1 class="card-title">Bienvenido</h1>
      <p class="card-subtitle">Portal del propietario</p>
    </div>

    <form onsubmit="event.preventDefault();">
      <div class="form-group">
        <label class="form-label" for="email">Correo electrónico</label>
        <div class="form-input-wrap">
          <svg class="form-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input class="form-input" type="email" id="email" placeholder="sucorreo@email.com" autocomplete="email" required />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <div class="form-input-wrap">
          <svg class="form-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
          <button type="button" class="form-toggle-pw" onclick="togglePw()" aria-label="Mostrar contraseña">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="form-row-between">
        <label class="form-check">
          <input type="checkbox" />
          Recordarme
        </label>
        <a href="#" class="form-forgot">¿Olvidó su contraseña?</a>
      </div>

      <button type="submit" class="btn-submit">
        Ingresar
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </form>

    <div class="card-footer">
      ¿Es administrador? <a href="login-profesional.html">Área Profesional</a>
    </div>
  </div>

  <script>
    function togglePw() {
      const inp = document.getElementById('password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
